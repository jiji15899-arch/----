name = "cloudpress"
compatibility_date = "2026-05-16"

# Cloudflare Pages 빌드 결과물 폴더 설정 (가장 중요)
pages_build_output_dir = "dist"

[build]
command = "npm run build"

# 환경변수 (실제 값은 Cloudflare Dashboard에서 설정)
[vars]
VITE_APP_DOMAIN = "cloud-press.co.kr"

# KV 네임스페이스 (캐시용 - 필요시 주석 해제)
# [[kv_namespaces]]
# binding = "CACHE"
# id = "your-kv-namespace-id"

# D1 데이터베이스 (필요시 주석 해제)
# [[d1_databases]]
# binding = "DB"
# database_name = "cloudpress"
# database_id = "your-d1-database-id"
